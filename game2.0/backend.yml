apiVersion: apps/v1
kind: Deployment

metadata:
 name: backend

spec:

 replicas: 1

 selector:
  matchLabels:
   app: backend

 template:

  metadata:
   labels:
    app: backend

  spec:

   containers:

   - name: backend

     image: kondareddy45/game2.0-backend:v2.3

     envFrom:

     - configMapRef:
         name: game-config

     - secretRef:
         name: game-secret

     ports:

     - containerPort: 8080

---

apiVersion: v1
kind: Service

metadata:
 name: backend-svc

spec:

 selector:
  app: backend

 ports:

 - port: 8080
