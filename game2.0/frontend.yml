apiVersion: apps/v1
kind: Deployment

metadata:
 name: frontend

spec:

 replicas: 1

 selector:
  matchLabels:
   app: frontend

 template:

  metadata:
   labels:
    app: frontend

  spec:

   containers:

   - name: nginx

     image: kondareddy45/game2.0-frontend:v2.0

     ports:

     - containerPort: 80

---

apiVersion: v1
kind: Service

metadata:
 name: frontend-svc

spec:

 type: NodePort

 selector:
  app: frontend

 ports:

 - port: 80

   nodePort: 30007
