apiVersion: apps/v1
kind: Deployment

metadata:
  name: app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: app

  template:
    metadata:
      labels:
        app: app

    spec:
      containers:

      - name: nodejs-app
        image: kondareddy45/gaming-app:v3

        ports:
        - containerPort: 8080

        env:

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: game-demo
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: game-demo
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: game-demo
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: secrets-gameing
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: secrets-gameing
              key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata: 
  name: app-svc
spec:
  selector:
    app: app
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
