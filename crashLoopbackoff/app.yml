apiVersion: apps/v1
kind: Deployment
metadata:
  name: two-tier-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: two-tier-app
  template:
    metadata:
      labels:
        app: two-tier-app
    spec:
      containers:
        - name: app
          image: kondareddy45/cashloopbackoff:v1
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: db-config
            - secretRef:
                name: db-secret
---

apiVersion: v1 
kind: Service
metadata:
  name: "app-svc"
spec:
  type: LoadBalancer
  selector: 
     app: two-tier-app
  ports:
    - port: 80
      targetPort: 300
